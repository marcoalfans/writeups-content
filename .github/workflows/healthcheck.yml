name: Link & image health

on:
  schedule:
    - cron: "0 7 * * 1"   # weekly (Mon 07:00 UTC) — advisory report, never fails the build
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check external links & images
        run: python3 scripts/linkcheck.py
