name: Validate writeups

on:
  push:
    branches: [main]
    paths:
      - "htb/**"
      - "ctf/**"
      - "bugbounty/**"
      - "scripts/validate.py"
  pull_request:
    paths:
      - "htb/**"
      - "ctf/**"
      - "bugbounty/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate frontmatter
        run: python3 scripts/validate.py
